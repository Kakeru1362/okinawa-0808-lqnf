<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>沖縄たび日程</title>
  <meta name="theme-color" content="#f2557e">
  <meta name="description" content="沖縄旅行 2026.8.8–8.10 のスケジュール">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="assets/icon-192.png">
  <link rel="apple-touch-icon" href="assets/icon-180.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@700;800&family=Zen+Maru+Gothic:wght@500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/timegrid.css">
  <link rel="stylesheet" href="css/tasklist.css">
</head>
<body>
  <div class="app">

    <header class="hero">
      <span class="petal"></span>
      <span class="petal"></span>
      <span class="petal"></span>

      <svg class="hibiscus hibiscus-l" viewBox="0 0 100 100" aria-hidden="true">
        <g fill="#ff9ab7">
          <ellipse cx="50" cy="29" rx="14" ry="21"/>
          <ellipse cx="50" cy="29" rx="14" ry="21" transform="rotate(72 50 50)"/>
          <ellipse cx="50" cy="29" rx="14" ry="21" transform="rotate(144 50 50)"/>
          <ellipse cx="50" cy="29" rx="14" ry="21" transform="rotate(216 50 50)"/>
          <ellipse cx="50" cy="29" rx="14" ry="21" transform="rotate(288 50 50)"/>
        </g>
        <g fill="#f2557e" opacity="0.5">
          <ellipse cx="50" cy="36" rx="6.5" ry="13"/>
          <ellipse cx="50" cy="36" rx="6.5" ry="13" transform="rotate(72 50 50)"/>
          <ellipse cx="50" cy="36" rx="6.5" ry="13" transform="rotate(144 50 50)"/>
          <ellipse cx="50" cy="36" rx="6.5" ry="13" transform="rotate(216 50 50)"/>
          <ellipse cx="50" cy="36" rx="6.5" ry="13" transform="rotate(288 50 50)"/>
        </g>
        <circle cx="50" cy="50" r="8" fill="#d13b6e"/>
        <path d="M50 50 L64 30" stroke="#ffd97a" stroke-width="3" stroke-linecap="round"/>
        <circle cx="64" cy="30" r="3.2" fill="#ffd97a"/>
        <circle cx="69" cy="34" r="2.4" fill="#ffd97a"/>
        <circle cx="60" cy="26.5" r="2.4" fill="#ffd97a"/>
      </svg>

      <svg class="hibiscus hibiscus-s" viewBox="0 0 100 100" aria-hidden="true">
        <g fill="#ffb7cc">
          <ellipse cx="50" cy="29" rx="14" ry="21"/>
          <ellipse cx="50" cy="29" rx="14" ry="21" transform="rotate(72 50 50)"/>
          <ellipse cx="50" cy="29" rx="14" ry="21" transform="rotate(144 50 50)"/>
          <ellipse cx="50" cy="29" rx="14" ry="21" transform="rotate(216 50 50)"/>
          <ellipse cx="50" cy="29" rx="14" ry="21" transform="rotate(288 50 50)"/>
        </g>
        <circle cx="50" cy="50" r="8" fill="#e8437a"/>
        <path d="M50 50 L62 32" stroke="#ffd97a" stroke-width="3" stroke-linecap="round"/>
        <circle cx="62" cy="32" r="3" fill="#ffd97a"/>
      </svg>

      <svg class="shisa-hero" viewBox="0 0 170 132" aria-hidden="true">
        <!-- しっぽ（くるん） -->
        <path d="M130 92 q 24 -2 22 -22 q -1 -14 -15 -14 q 10 7 8 17 q -3 12 -15 13 Z" fill="#b85c3e"/>
        <!-- 体（焼き物のテラコッタ色） -->
        <ellipse cx="100" cy="100" rx="34" ry="23" fill="#e08d5c"/>
        <!-- 前あし -->
        <rect x="74" y="96" width="13" height="30" rx="6.5" fill="#e08d5c"/>
        <rect x="95" y="100" width="13" height="27" rx="6.5" fill="#d67f4f"/>
        <!-- たてがみ -->
        <g fill="#b85c3e">
          <circle cx="46" cy="26" r="12"/>
          <circle cx="66" cy="17" r="12"/>
          <circle cx="86" cy="24" r="12"/>
          <circle cx="96" cy="41" r="12"/>
          <circle cx="97" cy="61" r="12"/>
          <circle cx="88" cy="78" r="12"/>
          <circle cx="38" cy="42" r="12"/>
          <circle cx="36" cy="62" r="12"/>
          <circle cx="45" cy="78" r="12"/>
        </g>
        <!-- たてがみの渦巻き（シーサーのくるくる） -->
        <g stroke="#8f4227" stroke-width="2" fill="none" stroke-linecap="round">
          <path d="M42 22 a5 5 0 1 0 7 5 a3 3 0 1 1 -4 -3"/>
          <path d="M62 13 a5 5 0 1 0 7 5 a3 3 0 1 1 -4 -3"/>
          <path d="M82 20 a5 5 0 1 0 7 5 a3 3 0 1 1 -4 -3"/>
          <path d="M92 37 a5 5 0 1 0 7 5 a3 3 0 1 1 -4 -3"/>
          <path d="M93 57 a5 5 0 1 0 7 5 a3 3 0 1 1 -4 -3"/>
          <path d="M34 38 a5 5 0 1 0 7 5 a3 3 0 1 1 -4 -3"/>
          <path d="M32 58 a5 5 0 1 0 7 5 a3 3 0 1 1 -4 -3"/>
          <path d="M41 74 a5 5 0 1 0 7 5 a3 3 0 1 1 -4 -3"/>
          <path d="M84 74 a5 5 0 1 0 7 5 a3 3 0 1 1 -4 -3"/>
        </g>
        <!-- 顔 -->
        <circle cx="66" cy="52" r="30" fill="#e08d5c"/>
        <!-- 口まわり -->
        <ellipse cx="66" cy="64.5" rx="16" ry="11.5" fill="#fbe0b8"/>
        <!-- まゆ毛（くるん） -->
        <g stroke="#fbe0b8" stroke-width="2.4" fill="none" stroke-linecap="round">
          <path d="M48 35 q 5 -6 12 -3"/>
          <path d="M84 35 q -5 -6 -12 -3"/>
        </g>
        <!-- 目（ぱっちり） -->
        <circle cx="55" cy="45" r="7" fill="#ffffff"/>
        <circle cx="78" cy="45" r="7" fill="#ffffff"/>
        <circle cx="56.5" cy="46.5" r="3.4" fill="#4a3028"/>
        <circle cx="76.5" cy="46.5" r="3.4" fill="#4a3028"/>
        <circle cx="57.6" cy="45.2" r="1.2" fill="#ffffff"/>
        <circle cx="77.6" cy="45.2" r="1.2" fill="#ffffff"/>
        <!-- 鼻（ひろめ） -->
        <rect x="58.5" y="55.5" width="15" height="6.5" rx="3.2" fill="#7a4632"/>
        <!-- 口（にかっと笑う） -->
        <clipPath id="shisaMouth"><path d="M51 63 Q 66 76 81 63 Q 79 74 66 74.5 Q 53 74 51 63 Z"/></clipPath>
        <path d="M51 63 Q 66 76 81 63 Q 79 74 66 74.5 Q 53 74 51 63 Z" fill="#8a4a33"/>
        <g clip-path="url(#shisaMouth)" fill="#ffffff">
          <circle cx="56" cy="64" r="2.8"/>
          <circle cx="61" cy="66.5" r="2.8"/>
          <circle cx="66" cy="67.5" r="2.8"/>
          <circle cx="71" cy="66.5" r="2.8"/>
          <circle cx="76" cy="64" r="2.8"/>
        </g>
        <!-- きば -->
        <path d="M50.5 62 l2.6 5 2.6 -4 Z" fill="#ffffff"/>
        <path d="M76.5 63 l2.6 4 2.6 -5 Z" fill="#ffffff"/>
        <!-- ほっぺ -->
        <circle cx="45" cy="57" r="4.6" fill="#f7a8b8" opacity="0.8"/>
        <circle cx="88" cy="57" r="4.6" fill="#f7a8b8" opacity="0.8"/>
      </svg>

      <p class="hero-eyebrow">OKINAWA TRIP</p>
      <h1>沖縄たび日程</h1>
      <p class="hero-dates">
        <span>2026.8.8 SAT – 8.10 MON</span>
        <span class="trip-status" id="tripStatus"></span>
      </p>

      <svg class="wave" viewBox="0 0 480 22" preserveAspectRatio="none" aria-hidden="true">
        <path d="M0 22 L0 12 Q 30 2 60 12 T 120 12 T 180 12 T 240 12 T 300 12 T 360 12 T 420 12 T 480 12 L480 22 Z" fill="#fff6f2"/>
      </svg>
    </header>

    <div class="sticky-head">
      <nav class="day-tabs" id="dayTabs" aria-label="日にちを選ぶ"></nav>
      <div class="filter-chips" id="filterChips" aria-label="分類タブ"></div>
    </div>

    <main class="timeline" id="timeline"></main>
  </div>

  <span class="sync-status" id="syncStatus"></span>
  <button class="fab" id="addBtn" aria-label="予定を追加">＋</button>

  <div class="sheet-backdrop" id="sheetBackdrop"></div>

  <div class="sheet detail-sheet" id="detailSheet" role="dialog" aria-modal="true" aria-labelledby="dTitle">
    <div class="sheet-handle"></div>
    <div class="sheet-top">
      <h2 id="dTitle"></h2>
      <button type="button" class="sheet-close" id="dClose">とじる</button>
    </div>
    <p class="detail-meta">
      <span class="detail-cat" id="dCat"></span>
      <span class="detail-time" id="dTime"></span>
      <span class="detail-reserved" id="dReserved"></span>
    </p>
    <p class="card-memo" id="dMemo" hidden></p>
    <div class="card-actions">
      <a class="btn-map" id="dMap" target="_blank" rel="noopener noreferrer" hidden>📍 マップを開く</a>
      <button type="button" class="btn-edit" id="dEdit">✏️ 編集</button>
    </div>
  </div>

  <div class="sheet" id="eventSheet" role="dialog" aria-modal="true" aria-labelledby="sheetTitle">
    <div class="sheet-handle"></div>
    <form id="eventForm" novalidate>
      <div class="sheet-top">
        <h2 id="sheetTitle">予定を追加</h2>
        <button type="button" class="sheet-close" id="fClose">とじる</button>
      </div>

      <p class="form-error" id="fError" hidden></p>

      <label class="field">
        <span class="field-label">予定名<span class="req">必須</span></span>
        <input type="text" id="fTitle" maxlength="50" placeholder="例：美ら海水族館でジンベエザメ" autocomplete="off">
      </label>

      <div class="field">
        <span class="field-label">分類<span class="req">必須</span></span>
        <div class="cat-chips" id="fCategories"></div>
      </div>

      <label class="field">
        <span class="field-label">日にち</span>
        <select id="fDate"></select>
      </label>

      <div class="field field-row">
        <label>
          <span class="field-label">開始</span>
          <input type="time" id="fStart">
        </label>
        <label>
          <span class="field-label">終了</span>
          <input type="time" id="fEnd">
        </label>
      </div>

      <div class="field">
        <span class="field-label">予約</span>
        <div class="segment">
          <label>
            <input type="radio" name="reserved" id="fReservedNo" checked>
            <span>予約なし</span>
          </label>
          <label>
            <input type="radio" name="reserved" id="fReservedYes">
            <span>🎫 予約済み</span>
          </label>
        </div>
      </div>

      <label class="field">
        <span class="field-label">Google マップ</span>
        <input type="url" id="fMap" placeholder="https://maps.app.goo.gl/…" autocomplete="off" inputmode="url">
        <span class="field-hint">Googleマップでお店を開いて「共有」→「リンクをコピー」で貼り付け</span>
      </label>

      <label class="field">
        <span class="field-label">メモ</span>
        <textarea id="fMemo" rows="3" maxlength="500" placeholder="持ち物、予約時間の注意など"></textarea>
      </label>

      <button type="submit" class="btn-save" id="fSave">保存する</button>
      <button type="button" class="btn-delete" id="fDelete" hidden>この予定を削除する</button>
    </form>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
